name: chat_kit
description: "A drop-in, WhatsApp-style chat package for Flutter backed by Firebase (Firestore, Realtime Database, Storage). Call it after Firebase Auth login."
version: 0.0.8
homepage:

environment:
  sdk: ^3.12.0
  flutter: ">=1.17.0"

dependencies:
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.5.0
  file_picker: ^11.0.2
  firebase_auth: ^6.5.2
  firebase_core: ^4.10.0
  firebase_database: ^12.4.2
  firebase_messaging: ^16.3.0
  firebase_storage: ^13.4.2
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  image_picker: ^1.2.2
  intl: ^0.20.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

